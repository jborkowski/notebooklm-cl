name: build

on:
  push:
    tags: ['*']

jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: brew install sbcl
      - run: |
          curl -O https://beta.quicklisp.org/quicklisp.lisp
          sbcl --non-interactive --load quicklisp.lisp \
            --eval '(quicklisp-quickstart:install)' --eval '(quit)'
      - run: |
          ln -s "$PWD" ~/quicklisp/local-projects/notebooklm-cl
          sbcl --non-interactive \
            --eval '(ql:quickload :notebooklm-cl)' \
            --eval '(sb-ext:save-lisp-and-die "notebooklm" :executable t :compression t :toplevel (quote notebooklm-cl.cli:main) :purify t)'
      - uses: actions/upload-artifact@v4
        with:
          name: notebooklm-macos-arm64
          path: notebooklm

  linux:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04-arm
            arch: arm64
          - os: ubuntu-latest
            arch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq sbcl libssl-dev curl
      - run: |
          curl -sOL https://beta.quicklisp.org/quicklisp.lisp
          sbcl --non-interactive --load quicklisp.lisp \
            --eval '(quicklisp-quickstart:install)' --eval '(quit)'
      - run: |
          ln -s "$PWD" ~/quicklisp/local-projects/notebooklm-cl
          sbcl --non-interactive \
            --eval '(ql:quickload :notebooklm-cl)' \
            --eval '(sb-ext:save-lisp-and-die "notebooklm" :executable t :compression t :toplevel (quote notebooklm-cl.cli:main) :purify t)'
      - uses: actions/upload-artifact@v4
        with:
          name: notebooklm-linux-${{ matrix.arch }}
          path: notebooklm
