name: build

on:
  push:
    tags: ['*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            arch: arm64
          - os: ubuntu-latest
            arch: amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install SBCL
        run: |
          if [ "${{ matrix.os }}" = "macos-14" ]; then
            brew install sbcl
          else
            sudo apt-get update && sudo apt-get install -y sbcl
          fi

      - name: Build
        run: |
          sbcl --non-interactive \
            --eval '(progn (load "notebooklm-cl.asd") (asdf:load-system :notebooklm-cl))' \
            --eval "(sb-ext:save-lisp-and-die \"notebooklm-${{ matrix.os }}-${{ matrix.arch }}\"
                      :executable t :compression t
                      :toplevel #'notebooklm-cl.cli:main :purify t)"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: notebooklm-${{ matrix.os }}-${{ matrix.arch }}
          path: notebooklm-${{ matrix.os }}-${{ matrix.arch }}
